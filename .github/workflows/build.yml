name: Build Windows EXE

# Builds a standalone .exe on every push to main and on manual dispatch.
# Download the artifact from the workflow run page (Actions tab).

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name HA_BB_Trader
          --collect-all customtkinter
          --collect-all SmartApi
          --hidden-import pyotp
          --hidden-import logzero
          --hidden-import websocket
          --paths src
          src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA_BB_Trader-windows
          path: dist/HA_BB_Trader.exe
          if-no-files-found: error
